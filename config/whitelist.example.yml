# Copy to config/whitelist.yml and fill in your real IDs. The real file is
# gitignored, like .env.
#
# Guilds and channels the bot will respond in:
# - Slash commands are synced only to the guilds listed here.
# - If a guild's `channels` list is empty or omitted, every channel in that
#   guild is allowed. Otherwise only the listed channel IDs are allowed.
# - `name` fields are informational only (for humans reading this file).
#
# Get IDs by enabling Developer Mode in Discord (Settings -> Advanced),
# then right-click a server/channel -> Copy ID.

guilds:
  - id: 123456789012345678
    name: "My Server"
    channels:
      - 234567890123456789   # #bot-commands
  - id: 987654321098765432
    name: "Another Server (all channels allowed)"
    channels: []

# Containers /restart is allowed to touch. Each entry is a regex that must
# match the FULL container name, e.g.:
#   - demo-.*
#   - my-web-app
# TEMPORARY: empty/omitted = no name restriction (the GOD_USER env var is
# then the only gate on /restart). This will become a required list later.
restartable_containers: []

# Guild IDs where the fun message reactions (bot/cogs/reactions.py) stay
# quiet: yes/no/ahh/kanye reacts and the "cum" joke reply are suppressed.
# Birthday-wish replies (happy/hbd/bday/congrats/feliz) always fire
# regardless. Omit/empty = reactions active everywhere.
reaction_silent_guilds: []
