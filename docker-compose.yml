name: miku

services:
  # One-shot: seeds config/whitelist.yml and config/blacklist.yml from their
  # .example.yml counterparts on first boot, if they don't exist yet. Needs
  # read-write access to do that, so it's split out from the bot service,
  # which keeps its own mount of the same directory read-only.
  config-init:
    image: alpine:3
    container_name: miku-config-init
    volumes:
      - ./config:/config
    command:
      - sh
      - -c
      - |
        [ -f /config/whitelist.yml ] || cp /config/whitelist.example.yml /config/whitelist.yml
        [ -f /config/blacklist.yml ] || cp /config/blacklist.example.yml /config/blacklist.yml

  bot:
    build: .
    container_name: miku-bot
    restart: unless-stopped
    environment:
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      GOD_USER: ${GOD_USER}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      DOCKER_HOST: tcp://docker-proxy:2375
      WHITELIST_PATH: /app/config/whitelist.yml
      BLACKLIST_PATH: /app/config/blacklist.yml
    volumes:
      - ./config:/app/config:ro
    depends_on:
      postgres:
        condition: service_healthy
      docker-proxy:
        condition: service_started
      config-init:
        condition: service_completed_successfully

  postgres:
    image: postgres:16-alpine
    container_name: miku-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Gateway to the host Docker daemon. GET container endpoints plus
  # restart/stop/kill are exposed; every other write stays denied, so the
  # bot can never create, remove, or exec into anything.
  #
  # ALLOW_RESTARTS applies to ALL containers — the proxy cannot filter by
  # name (the API accepts IDs interchangeably, so path matching on names
  # would be bypassable). The per-name regex whitelist is enforced by the
  # bot; see restartable_containers in config/whitelist.yml.
  docker-proxy:
    image: tecnativa/docker-socket-proxy:latest
    container_name: miku-docker-proxy
    restart: unless-stopped
    environment:
      CONTAINERS: 1
      IMAGES: 1
      POST: 0
      ALLOW_RESTARTS: 1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

volumes:
  pgdata:
