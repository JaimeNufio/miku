name: miku

services:
  # One-shot: seeds whitelist.yml and blacklist.yml into the configdata
  # volume from the .example.yml files baked into the image (see
  # Dockerfile), if they don't exist yet. Runs as root (overriding the
  # image's default miku user) since a fresh named volume is root-owned
  # until something writes to it. bot mounts the same volume read-only.
  config-init:
    build: .
    container_name: miku-config-init
    user: "0:0"
    volumes:
      - configdata:/app/config
    entrypoint: ["sh", "-c"]
    command:
      - |
        [ -f /app/config/whitelist.yml ] || cp /app/config-defaults/whitelist.example.yml /app/config/whitelist.yml
        [ -f /app/config/blacklist.yml ] || cp /app/config-defaults/blacklist.example.yml /app/config/blacklist.yml

  bot:
    build: .
    container_name: miku-bot
    restart: unless-stopped
    environment:
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      GOD_USER: ${GOD_USER}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      DOCKER_HOST: tcp://docker-proxy:2375
      WHITELIST_PATH: /app/config/whitelist.yml
      BLACKLIST_PATH: /app/config/blacklist.yml
    volumes:
      - configdata:/app/config:ro
    depends_on:
      postgres:
        condition: service_healthy
      docker-proxy:
        condition: service_started
      config-init:
        condition: service_completed_successfully

  postgres:
    image: postgres:16-alpine
    container_name: miku-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ${POSTGRES_DATA_DIR:-pgdata}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Gateway to the host Docker daemon. GET container endpoints plus
  # restart/stop/kill are exposed; every other write stays denied, so the
  # bot can never create, remove, or exec into anything.
  #
  # ALLOW_RESTARTS applies to ALL containers — the proxy cannot filter by
  # name (the API accepts IDs interchangeably, so path matching on names
  # would be bypassable). The per-name regex whitelist is enforced by the
  # bot; see restartable_containers in config/whitelist.yml.
  docker-proxy:
    image: tecnativa/docker-socket-proxy:latest
    container_name: miku-docker-proxy
    restart: unless-stopped
    environment:
      CONTAINERS: 1
      IMAGES: 1
      POST: 0
      ALLOW_RESTARTS: 1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

volumes:
  configdata:
  pgdata:
