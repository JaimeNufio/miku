services:
  bot:
    build: .
    container_name: miku-bot
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      DOCKER_HOST: tcp://docker-proxy:2375
      WHITELIST_PATH: /app/config/whitelist.yml
    volumes:
      - ./config:/app/config:ro
    depends_on:
      postgres:
        condition: service_healthy
      docker-proxy:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    container_name: miku-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Read-only gateway to the host Docker daemon. Only GET endpoints for
  # containers are exposed (POST/PUT/DELETE are denied by default), so the
  # bot can inspect container state but can never start/stop/remove anything.
  docker-proxy:
    image: tecnativa/docker-socket-proxy:latest
    container_name: miku-docker-proxy
    restart: unless-stopped
    environment:
      CONTAINERS: 1
      POST: 0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

volumes:
  pgdata:
